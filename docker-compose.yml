# ============================================================================
# 幻兽帕鲁服务器 + Web 管理面板  一键部署
#   - palworld-server : 游戏服务端 (REST API + 自动更新/备份)
#   - palworld-panel  : Web 后台管理面板 (FastAPI + Vue3, 挂载 docker.sock)
#
# 部署:  cp .env.example .env  &&  修改密码  &&  docker compose up -d --build
# ============================================================================

services:
  palworld-server:
    # 轻量镜像(~200MB), 服务端本体由 steamcmd 从 Steam CDN 拉取(国内可达)
    image: cm2network/steamcmd:root
    container_name: palworld-server
    restart: unless-stopped
    stop_grace_period: 30s          # 关闭前留出存档时间
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    ports:
      # 端口映射固定; 若改了 server.env 里的 PORT/REST_API_PORT, 需同步这里
      - "8211:8211/udp"             # 游戏端口
      - "8212:8212/tcp"             # REST API 端口
    # 全部服务端启动参数 / 配置 集中在 game/server.env, 见该文件说明
    env_file:
      - ./game/server.env
    environment:
      # 仅保留与 compose 强相关的运行时注入 (代理), 其余都在 server.env
      HTTP_PROXY: ${SERVER_HTTP_PROXY:-}
      HTTPS_PROXY: ${SERVER_HTTP_PROXY:-}
    volumes:
      - ./game/entrypoint.sh:/entrypoint.sh:ro
      - ./data/palworld:/palworld            # 服务端本体 + 存档 + 配置
      - ./data/steamcmd:/opt/steamcmd        # steamcmd 本体独立持久化 (不能嵌进 /palworld,
                                             #   否则 app_update validate 会校验到它导致权限错)
    healthcheck:
      # 纯 bash TCP 探测 REST 端口, 无需额外工具
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8212' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s            # 首次需下载服务端, 给足时间

  palworld-panel:
    build:
      context: ./panel
      # 构建镜像时的代理 / pip / npm 源 (国内加速, 见 .env)
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTP_PROXY:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    image: palworld-panel:latest
    container_name: palworld-panel
    restart: unless-stopped
    depends_on:
      - palworld-server
    ports:
      - "${PANEL_PORT:-8000}:8000"
    # 复用 server.env 以拿到 ADMIN_PASSWORD (REST API 认证需要),
    # 与游戏容器共用同一份, 避免密码重复维护
    env_file:
      - ./game/server.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      # 面板登录
      PANEL_USERNAME: ${PANEL_USERNAME:-admin}
      PANEL_PASSWORD: ${PANEL_PASSWORD:?PANEL_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      # 目标游戏服务器 (compose 内网直连)
      PAL_CONTAINER_NAME: palworld-server
      PAL_REST_BASE: http://palworld-server:8212
      # 数据目录 (与游戏容器共享同一宿主机路径)
      PAL_DATA_DIR: /data/palworld
      PAL_BACKUP_DIR: /data/backup
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # 控制游戏容器
      - ./data:/data                                # 存档 / 备份读写
